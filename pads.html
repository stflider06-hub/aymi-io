<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-key="page_title">AYMI — Галерея прокладок</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f7f7f7; color: #1f2937; }
    .pads-page { min-height: 100vh; background: radial-gradient(circle at top left, rgba(88,166,255,.18), transparent 35%), radial-gradient(circle at bottom right, rgba(95,199,161,.22), transparent 35%), linear-gradient(180deg, #ffffff 0%, #eef8f6 100%); }
    .pads-header { position: sticky; top: 0; z-index: 1000; background: linear-gradient(90deg, #58a6ff, #5fc7a1); box-shadow: 0 8px 25px rgba(0,0,0,.15); }
    .pads-nav { max-width: 1150px; margin: 0 auto; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; gap: 14px; }
    .pads-logo { display: flex; align-items: center; gap: 12px; color: #fff; font-size: 24px; font-weight: 900; text-decoration: none; }
    .pads-logo img { width: 48px; height: 48px; border-radius: 14px; background: #fff; padding: 4px; object-fit: cover; }
    .pads-menu { display: flex; gap: 28px; }
    .pads-menu a { color: #fff; text-decoration: none; font-weight: 800; transition: .3s; }
    .pads-menu a:hover { transform: translateY(-2px); opacity: .85; }
    .pads-right{ display:flex; align-items:center; gap:14px; }
    .pads-order { background: #fff; color: #1f2937; padding: 14px 24px; border-radius: 16px; font-weight: 900; text-decoration: none; transition: .3s; }
    .pads-order:hover { transform: translateY(-3px); }
    .language{ position:relative; }
    .language-btn{ border:1px solid rgba(255,255,255,.35); background:rgba(255,255,255,.18); color:#fff; padding:10px 16px; border-radius:999px; font-weight:900; cursor:pointer; box-shadow:0 8px 22px rgba(0,0,0,.08); }
    .language-menu{ display:none; position:absolute; top:46px; right:0; background:rgba(255,255,255,.98); border-radius:18px; padding:8px; box-shadow:0 18px 45px rgba(0,0,0,.16); min-width:150px; z-index:9999; }
    .language-menu.show{ display:grid; gap:3px; }
    .language-menu button{ border:none; background:transparent; padding:9px 12px; border-radius:12px; text-align:left; font-weight:800; cursor:pointer; color:#1f2937; transition:.2s; }
    .language-menu button:hover{ background:#eef8f6; color:#2563eb; }
    .pads-hero{ text-align:center; padding:50px 18px 30px; }
    .pads-hero span { display: inline-block; padding: 10px 18px; border-radius: 999px; background: rgba(88,166,255,.14); color: #2563eb; font-weight: 900; text-transform: uppercase; font-size: 14px; }
    .pads-hero h1{ font-size:42px; line-height:1.1; margin:15px 0; font-weight:900; color:#1f2937; }
    .pads-hero p{ max-width:700px; margin:0 auto; font-size:16px; line-height:1.7; color:#6b7280; }
    .slider-wrap { max-width: 1080px; margin: 20px auto 70px; padding: 0 18px; }
    .main-slider { position: relative; background: #fff; padding: 22px; border-radius: 34px; box-shadow: 0 18px 45px rgba(0,0,0,.12); overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .main-slider img { width: auto; max-width: 100%; height: auto; max-height: 700px; object-fit: contain; border-radius: 26px; display: block; transition: .45s ease; }
    .main-slider:hover img { transform: scale(1.015); }
    .arrow { position: absolute; top: 50%; transform: translateY(-50%); width: 54px; height: 54px; border-radius: 50%; border: none; cursor: pointer; background: linear-gradient(90deg, #58a6ff, #5fc7a1); color: #fff; font-size: 34px; font-weight: 900; box-shadow: 0 10px 25px rgba(0,0,0,.18); transition: .3s; }
    .arrow:hover { transform: translateY(-50%) scale(1.08); }
    .prev { left: 36px; } .next { right: 36px; }
    .thumbs { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-top: 18px; }
    .thumb { height: 135px; border-radius: 20px; overflow: hidden; background: #fff; box-shadow: 0 8px 20px rgba(0,0,0,.08); border: 3px solid transparent; cursor: pointer; transition: .3s; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: .35s; }
    .thumb:hover { transform: translateY(-5px); }
    .thumb:hover img { transform: scale(1.08); }
    .thumb.active { border-color: #58a6ff; box-shadow: 0 0 22px rgba(88,166,255,.35); transform: translateY(-5px); }
    .pads-footer { background: #111827; color: #fff; text-align: center; padding: 28px 10px; margin-top: 40px; font-family: Arial, sans-serif; }
    .pads-footer strong { font-size: 22px; display: block; margin-bottom: 8px; }
    .pads-footer p { margin: 0; color: #d1d5db; }
    body[dir="rtl"] .language-menu{ right:auto; left:0; }
    body[dir="rtl"] .language-menu button{ text-align:right; }
    @media (max-width: 900px) { .pads-menu { display: none; } .pads-hero h1 { font-size: 38px; } .main-slider img { height: auto; max-height: 620px; } .thumbs { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 560px) { .pads-nav{ flex-wrap:wrap; } .pads-hero { padding: 45px 14px 25px; } .pads-hero h1 { font-size: 31px; } .main-slider { padding: 14px; border-radius: 26px; } .main-slider img { max-height: 520px; height: auto; border-radius: 20px; } .thumbs { grid-template-columns: repeat(2, 1fr); } .thumb { height: 115px; } .arrow { width: 44px; height: 44px; font-size: 26px; } .prev { left: 22px; } .next { right: 22px; } .pads-order{padding:12px 18px;} }
  </style>
</head>

<body class="pads-page">
<header class="pads-header">
  <div class="pads-nav">
    <a href="index.html" class="pads-logo">
      <img src="aymi-logo.jpg" alt="AYMI">
      <span>AYMI</span>
    </a>

    <nav class="pads-menu">
      <a href="index.html" data-key="menu_home">Главная</a>
      <a href="index.html#catalog" data-key="menu_catalog">Каталог</a>
      <a href="index.html#contact" data-key="menu_contact">Контакты</a>
    </nav>

    <div class="pads-right">
      <div class="language">
        <button class="language-btn" id="languageBtn" onclick="toggleLangMenu()">🌐 RU</button>
        <div class="language-menu" id="languageMenu">
          <button onclick="setLang('ru')">Русский</button>
          <button onclick="setLang('en')">English</button>
          <button onclick="setLang('kg')">Кыргызча</button>
          <button onclick="setLang('kz')">Қазақша</button>
          <button onclick="setLang('uz')">O'zbekcha</button>
          <button onclick="setLang('tr')">Türkçe</button>
          <button onclick="setLang('ar')">العربية</button>
        </div>
      </div>
      <a href="index.html#contact" class="pads-order" data-key="order_btn">Заказать</a>
    </div>
  </div>
</header>

<main>
  <section class="pads-hero">
    <span data-key="gallery_badge">Галерея продукции</span>
    <h1 data-key="gallery_title">Прокладки AYMI</h1>
    <p data-key="gallery_text">Фотографии продукции AYMI: упаковка, линейки и реальные изображения товара.</p>
  </section>

  <section class="slider-wrap">
    <div class="main-slider">
      <img id="mainImage" src="images/photo1.jpg" alt="AYMI product">
      <button class="arrow prev" onclick="prevSlide()">‹</button>
      <button class="arrow next" onclick="nextSlide()">›</button>
    </div>

    <div class="thumbs">
      <div class="thumb active" onclick="setSlide(0)"><img src="images/photo1.jpg" alt="AYMI"></div>
      <div class="thumb" onclick="setSlide(1)"><img src="images/photo2.jpg" alt="AYMI"></div>
      <div class="thumb" onclick="setSlide(2)"><img src="images/photo3.jpg" alt="AYMI"></div>
      <div class="thumb" onclick="setSlide(3)"><img src="images/photo4.jpg" alt="AYMI"></div>
      <div class="thumb" onclick="setSlide(4)"><img src="images/photo5.jpg" alt="AYMI"></div>
      <div class="thumb" onclick="setSlide(5)"><img src="images/photo6.jpg" alt="AYMI"></div>
      <div class="thumb" onclick="setSlide(6)"><img src="images/photo7.jpg" alt="AYMI"></div>
      <div class="thumb" onclick="setSlide(7)"><img src="images/photo8.jpg" alt="AYMI"></div>
      <div class="thumb" onclick="setSlide(8)"><img src="images/photo9.jpg" alt="AYMI"></div>
    </div>
  </section>
</main>

<footer class="pads-footer">
  <strong>AYMI</strong>
  <p data-key="footer_text">© 2026. Натуральный комфорт каждый день.</p>
</footer>

<script>
const slides = ["images/photo1.jpg","images/photo2.jpg","images/photo3.jpg","images/photo4.jpg","images/photo5.jpg","images/photo6.jpg","images/photo7.jpg","images/photo8.jpg","images/photo9.jpg"];
let current = 0;
function updateSlider(){
  document.getElementById("mainImage").src = slides[current];
  document.querySelectorAll(".thumb").forEach((thumb,index)=>thumb.classList.toggle("active", index === current));
}
function setSlide(index){ current = index; updateSlider(); }
function nextSlide(){ current = (current + 1) % slides.length; updateSlider(); }
function prevSlide(){ current = (current - 1 + slides.length) % slides.length; updateSlider(); }
function toggleLangMenu(){ document.getElementById("languageMenu").classList.toggle("show"); }
document.addEventListener("click", function(e){
  const language = document.querySelector(".language");
  if(language && !language.contains(e.target)){ document.getElementById("languageMenu").classList.remove("show"); }
});

const translations = {
  ru:{page_title:"AYMI — Галерея прокладок",menu_home:"Главная",menu_catalog:"Каталог",menu_contact:"Контакты",order_btn:"Заказать",gallery_badge:"Галерея продукции",gallery_title:"Прокладки AYMI",gallery_text:"Фотографии продукции AYMI: упаковка, линейки и реальные изображения товара.",footer_text:"© 2026. Натуральный комфорт каждый день."},
  en:{page_title:"AYMI — Product Gallery",menu_home:"Home",menu_catalog:"Catalog",menu_contact:"Contacts",order_btn:"Order",gallery_badge:"Product gallery",gallery_title:"AYMI sanitary pads",gallery_text:"Photos of AYMI products: packaging, product lines, and real product images.",footer_text:"© 2026. Natural comfort every day."},
  kg:{page_title:"AYMI — продукция галереясы",menu_home:"Башкы бет",menu_catalog:"Каталог",menu_contact:"Байланыш",order_btn:"Заказ берүү",gallery_badge:"Продукция галереясы",gallery_title:"AYMI прокладкалары",gallery_text:"AYMI продукциясынын сүрөттөрү: таңгак, линейкалар жана товардын чыныгы көрүнүштөрү.",footer_text:"© 2026. Ар бир күн үчүн табигый комфорт."},
  kz:{page_title:"AYMI — өнім галереясы",menu_home:"Басты бет",menu_catalog:"Каталог",menu_contact:"Байланыс",order_btn:"Тапсырыс беру",gallery_badge:"Өнім галереясы",gallery_title:"AYMI төсемдері",gallery_text:"AYMI өнімдерінің фотосуреттері: қаптама, өнім желілері және нақты тауар суреттері.",footer_text:"© 2026. Әр күнге табиғи жайлылық."},
  uz:{page_title:"AYMI — mahsulotlar galereyasi",menu_home:"Bosh sahifa",menu_catalog:"Katalog",menu_contact:"Aloqa",order_btn:"Buyurtma",gallery_badge:"Mahsulotlar galereyasi",gallery_title:"AYMI prokladkalari",gallery_text:"AYMI mahsulotlari suratlari: qadoqlar, yo‘nalishlar va haqiqiy mahsulot ko‘rinishlari.",footer_text:"© 2026. Har kuni tabiiy qulaylik."},
  tr:{page_title:"AYMI — Ürün galerisi",menu_home:"Ana sayfa",menu_catalog:"Katalog",menu_contact:"İletişim",order_btn:"Sipariş ver",gallery_badge:"Ürün galerisi",gallery_title:"AYMI hijyenik pedleri",gallery_text:"AYMI ürün fotoğrafları: ambalaj, ürün serileri ve gerçek ürün görselleri.",footer_text:"© 2026. Her gün doğal konfor."},
  ar:{page_title:"AYMI — معرض المنتجات",menu_home:"الرئيسية",menu_catalog:"المنتجات",menu_contact:"التواصل",order_btn:"اطلب الآن",gallery_badge:"معرض المنتجات",gallery_title:"فوط AYMI الصحية",gallery_text:"صور منتجات AYMI: التغليف، خطوط المنتجات والصور الحقيقية للمنتج.",footer_text:"© 2026. راحة طبيعية كل يوم."}
};
function setLang(lang){
  document.querySelectorAll("[data-key]").forEach(el=>{
    const key = el.getAttribute("data-key");
    if(translations[lang] && translations[lang][key]) el.textContent = translations[lang][key];
  });
  if(translations[lang] && translations[lang].page_title){ document.title = translations[lang].page_title; }
  const labels = {ru:"🌐 RU", en:"🌐 EN", kg:"🌐 KG", kz:"🌐 KZ", uz:"🌐 UZ", tr:"🌐 TR", ar:"🌐 AR"};
  document.getElementById("languageBtn").textContent = labels[lang];
  document.getElementById("languageMenu").classList.remove("show");
  localStorage.setItem("aymiLang", lang);
  document.body.dir = lang === "ar" ? "rtl" : "ltr";
}
window.addEventListener("load",()=>setLang(localStorage.getItem("aymiLang") || "ru"));
</script>
</body>
</html>
