<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AYMI — Галерея прокладок</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #1f2937;
    }

    .pads-page {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(88,166,255,.18), transparent 35%),
        radial-gradient(circle at bottom right, rgba(95,199,161,.22), transparent 35%),
        linear-gradient(180deg, #ffffff 0%, #eef8f6 100%);
    }

    .pads-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: linear-gradient(90deg, #58a6ff, #5fc7a1);
      box-shadow: 0 8px 25px rgba(0,0,0,.15);
    }

    .pads-nav {
      max-width: 1150px;
      margin: 0 auto;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .pads-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #fff;
      font-size: 24px;
      font-weight: 900;
      text-decoration: none;
    }

    .pads-logo img {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: #fff;
      padding: 4px;
      object-fit: cover;
    }

    .pads-menu {
      display: flex;
      gap: 28px;
    }

    .pads-menu a {
      color: #fff;
      text-decoration: none;
      font-weight: 800;
      transition: .3s;
    }

    .pads-menu a:hover {
      transform: translateY(-2px);
      opacity: .85;
    }

    .pads-order {
      background: #fff;
      color: #1f2937;
      padding: 14px 24px;
      border-radius: 16px;
      font-weight: 900;
      text-decoration: none;
      transition: .3s;
    }

    .pads-order:hover {
      transform: translateY(-3px);
    }

    .pads-hero{
    text-align:center;
    padding:50px 18px 30px;
}

    .pads-hero span {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(88,166,255,.14);
      color: #2563eb;
      font-weight: 900;
      text-transform: uppercase;
      font-size: 14px;
    }

   .pads-hero h1{
    font-size:42px;
    line-height:1.1;
    margin:15px 0;
    font-weight:900;
    color:#1f2937;
}

   .pads-hero p{
    max-width:700px;
    margin:0 auto;
    font-size:16px;
    line-height:1.7;
    color:#6b7280;
}

    .slider-wrap {
      max-width: 1080px;
      margin: 20px auto 70px;
      padding: 0 18px;
    }

    .main-slider {
      position: relative;
      background: #fff;
      padding: 22px;
      border-radius: 34px;
      box-shadow: 0 18px 45px rgba(0,0,0,.12);
      overflow: hidden;
    }

    .main-slider img {
      width: 100%;
      height: 560px;
      object-fit: cover;
      border-radius: 26px;
      display: block;
      transition: .45s ease;
    }

    .main-slider:hover img {
      transform: scale(1.015);
    }

    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: linear-gradient(90deg, #58a6ff, #5fc7a1);
      color: #fff;
      font-size: 34px;
      font-weight: 900;
      box-shadow: 0 10px 25px rgba(0,0,0,.18);
      transition: .3s;
    }

    .arrow:hover {
      transform: translateY(-50%) scale(1.08);
    }

    .prev { left: 36px; }
    .next { right: 36px; }

    .thumbs {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      margin-top: 18px;
    }

    .thumb {
      height: 135px;
      border-radius: 20px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 8px 20px rgba(0,0,0,.08);
      border: 3px solid transparent;
      cursor: pointer;
      transition: .3s;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: .35s;
    }

    .thumb:hover {
      transform: translateY(-5px);
    }

    .thumb:hover img {
      transform: scale(1.08);
    }

    .thumb.active {
      border-color: #58a6ff;
      box-shadow: 0 0 22px rgba(88,166,255,.35);
      transform: translateY(-5px);
    }

    .pads-footer {
      background: #111827;
      color: #fff;
      text-align: center;
      padding: 28px 10px;
      margin-top: 40px;
      font-family: Arial, sans-serif;
    }

    .pads-footer strong {
      font-size: 22px;
      display: block;
      margin-bottom: 8px;
    }

    .pads-footer p {
      margin: 0;
      color: #d1d5db;
    }

    @media (max-width: 900px) {
      .pads-menu {
        display: none;
      }

      .pads-hero h1 {
        font-size: 38px;
      }

      .main-slider img {
        height: 420px;
      }

      .thumbs {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 560px) {
      .pads-hero {
        padding: 45px 14px 25px;
      }

      .pads-hero h1 {
        font-size: 31px;
      }

      .main-slider {
        padding: 14px;
        border-radius: 26px;
      }

      .main-slider img {
        height: 300px;
        border-radius: 20px;
      }

      .thumbs {
        grid-template-columns: repeat(2, 1fr);
      }

      .thumb {
        height: 115px;
      }

      .arrow {
        width: 44px;
        height: 44px;
        font-size: 26px;
      }

      .prev { left: 22px; }
      .next { right: 22px; }
    }
  </style>
</head>

<body class="pads-page">

<header class="pads-header">
  <div class="pads-nav">
    <a href="index.html" class="pads-logo">
      <img src="aymi-logo.jpg" alt="AYMI">
      <span>AYMI</span>
    </a>

    <nav class="pads-menu">
      <a href="index.html">Главная</a>
      <a href="index.html#catalog">Каталог</a>
      <a href="index.html#contact">Контакты</a>
    </nav>

    <a href="index.html#contact" class="pads-order">Заказать</a>
  </div>
</header>

<main>
  <section class="pads-hero">
    <span>Галерея продукции</span>
    <h1>Прокладки AYMI</h1>
    <p>Фотографии продукции AYMI. Позже временные изображения заменим на реальные фото упаковки и товара.</p>
  </section>

  <section class="slider-wrap">
    <div class="main-slider">
      <img id="mainImage" src="https://images.unsplash.com/photo-1612817288484-6f916006741a?w=1400" alt="AYMI product">

      <button class="arrow prev" onclick="prevSlide()">‹</button>
      <button class="arrow next" onclick="nextSlide()">›</button>
    </div>

    <div class="thumbs">
      <div class="thumb active" onclick="setSlide(0)">
        <img src="https://images.unsplash.com/photo-1612817288484-6f916006741a?w=700" alt="AYMI">
      </div>

      <div class="thumb" onclick="setSlide(1)">
        <img src="https://images.unsplash.com/photo-1607619056574-7b8d3ee536b2?w=700" alt="AYMI">
      </div>

      <div class="thumb" onclick="setSlide(2)">
        <img src="https://images.unsplash.com/photo-1583947215259-38e31be8751f?w=700" alt="AYMI">
      </div>

      <div class="thumb" onclick="setSlide(3)">
        <img src="https://images.unsplash.com/photo-1515377905703-c4788e51af15?w=700" alt="AYMI">
      </div>

      <div class="thumb" onclick="setSlide(4)">
        <img src="https://images.unsplash.com/photo-1571781926291-c477ebfd024b?w=700" alt="AYMI">
      </div>
    </div>
  </section>
</main>

<footer class="pads-footer">
  <strong>AYMI</strong>
  <p>© 2026. Натуральный комфорт каждый день.</p>
</footer>

<script>
  const slides = [
    "https://images.unsplash.com/photo-1612817288484-6f916006741a?w=1400",
    "https://images.unsplash.com/photo-1607619056574-7b8d3ee536b2?w=1400",
    "https://images.unsplash.com/photo-1583947215259-38e31be8751f?w=1400",
    "https://images.unsplash.com/photo-1515377905703-c4788e51af15?w=1400",
    "https://images.unsplash.com/photo-1571781926291-c477ebfd024b?w=1400"
  ];

  let current = 0;

  function updateSlider() {
    document.getElementById("mainImage").src = slides[current];

    document.querySelectorAll(".thumb").forEach((thumb, index) => {
      thumb.classList.toggle("active", index === current);
    });
  }

  function setSlide(index) {
    current = index;
    updateSlider();
  }

  function nextSlide() {
    current = (current + 1) % slides.length;
    updateSlider();
  }

  function prevSlide() {
    current = (current - 1 + slides.length) % slides.length;
    updateSlider();
  }
</script>

</body>
</html>
